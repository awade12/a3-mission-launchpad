name: Publish deliverables
description: Build release deliverables and upload installer assets to a release tag

inputs:
  version:
    description: Version number without leading v
    required: true
  github_token:
    description: GitHub token used by gh release upload
    required: true
  platform:
    description: Target platform (windows or linux)
    required: true
  architecture:
    description: Target architecture (x64)
    required: false
    default: x64

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r launchpad_server/requirements.txt
        python -m pip install pyinstaller pillow

    - name: Install renderer dependencies
      shell: bash
      run: npm ci
      working-directory: launchpad_client/renderer

    - name: Install app dependencies
      shell: bash
      run: npm ci
      working-directory: launchpad_client/app

    - name: Build project deliverables
      shell: bash
      run: python build.py

    - name: Build Electron installers
      shell: bash
      run: |
        set -euo pipefail
        export LAUNCHPAD_ELECTRON_OUT="$GITHUB_WORKSPACE/build/electron-forge-release"
        npm run make
      working-directory: launchpad_client/app

    - name: Upload installer assets to release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        TAG="v${{ inputs.version }}"
        ARCH="${{ inputs.architecture }}"
        PLATFORM="${{ inputs.platform }}"
        OUT="$GITHUB_WORKSPACE/build/electron-forge-release/make"
        shopt -s nullglob

        FILES=()
        if [ "$PLATFORM" = "windows" ]; then
          BASE="$OUT/squirrel.windows/$ARCH"
          FILES=("$BASE"/*.exe "$BASE"/*.nupkg "$BASE"/RELEASES)
        elif [ "$PLATFORM" = "linux" ]; then
          FILES=("$OUT/deb/$ARCH"/*.deb "$OUT/rpm/$ARCH"/*.rpm)
        else
          echo "Unsupported platform: $PLATFORM"
          exit 1
        fi

        if [ "${#FILES[@]}" -eq 0 ]; then
          echo "No installer assets found for platform=$PLATFORM arch=$ARCH under $OUT"
          exit 1
        fi

        gh release upload "$TAG" "${FILES[@]}" --clobber
