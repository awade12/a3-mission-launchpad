# Unit tests for the Electron main-process package (no GUI).
name: Client app tests

on:
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: client-app-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Vitest (main process)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: launchpad_client/app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: launchpad_client/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
